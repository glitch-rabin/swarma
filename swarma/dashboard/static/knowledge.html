<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>swarma -- knowledge</title>
  <link rel="stylesheet" href="/static/shared.css">
</head>
<body>
  <div class="app-layout">
    <nav class="sidebar" id="sidebar"></nav>

    <div class="main">
      <div class="page-header">
        <h2>knowledge</h2>
      </div>

      <div class="stats-bar" id="stats-bar">
        <div class="stat">
          <span class="stat-value" id="stat-status">-</span>
          <span class="stat-label">qmd status</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-total">-</span>
          <span class="stat-label">total artifacts</span>
        </div>
      </div>

      <div class="page-content">
        <div class="card">
          <div class="card-header">
            <div><span class="prefix">#</span><h3 style="display:inline">collections</h3></div>
          </div>
          <div class="card-body" id="collections-table" style="padding:0;">
            <div class="loading">loading</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/shared.js"></script>
  <script>

    async function loadKnowledge() {
      const statusEl = document.getElementById('stat-status');
      const totalEl = document.getElementById('stat-total');
      const tableEl = document.getElementById('collections-table');

      try {
        const data = await api('/knowledge/status');

        // Status tag
        const isConnected = data.status === 'connected';
        const tagClass = isConnected ? 'tag-ok' : 'tag-err';
        statusEl.innerHTML = `<span class="tag ${tagClass}">${data.status}</span>`;

        // Total artifacts
        totalEl.textContent = data.total_artifacts || 0;

        // Collections table
        const collections = data.collections || {};
        const names = Object.keys(collections);

        if (names.length === 0) {
          tableEl.innerHTML = '<div class="empty">no artifacts stored yet. run a cycle to start building knowledge.</div>';
          return;
        }

        let html = `
          <table>
            <thead>
              <tr>
                <th>collection</th>
                <th>artifacts</th>
              </tr>
            </thead>
            <tbody>
        `;

        for (const name of names.sort()) {
          html += `
            <tr>
              <td>${name}</td>
              <td>${collections[name]}</td>
            </tr>
          `;
        }

        html += '</tbody></table>';
        tableEl.innerHTML = html;
      } catch (e) {
        statusEl.innerHTML = '<span class="tag tag-err">error</span>';
        totalEl.textContent = '-';
        tableEl.innerHTML = '<div class="empty">could not load knowledge status.</div>';
      }
    }

    renderSidebar('knowledge');
    loadKnowledge();

  </script>
</body>
</html>
