<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>swarma -- dashboard</title>
  <link rel="stylesheet" href="/static/shared.css">
  <style>
    .loop-connector {
      display: flex;
      align-items: center;
      justify-content: center;
      grid-column: 1 / -1;
      padding: 2px 0;
      color: var(--gold-dim);
      font-size: 12px;
      letter-spacing: 4px;
    }
    .stats-bar { margin-bottom: 0; }
    .loop-section { margin-bottom: 24px; }
    .loop-section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <nav class="sidebar" id="sidebar"></nav>

    <div class="main">
      <div class="page-header">
        <h2>dashboard</h2>
      </div>

      <!-- Stats bar -->
      <div class="stats-bar" id="stats-bar">
        <div class="stat">
          <span class="stat-value" id="stat-experiments">-</span>
          <span class="stat-label">experiments</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-running">-</span>
          <span class="stat-label">running</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-winrate">-</span>
          <span class="stat-label">win rate</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-rules">-</span>
          <span class="stat-label">playbook rules</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-cost-today">-</span>
          <span class="stat-label">cost today</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-cost-month">-</span>
          <span class="stat-label">cost month</span>
        </div>
      </div>

      <div class="page-content">

        <!-- THE LOOP: 2x2 grid -->
        <div class="loop-section">
          <div class="loop-section-title">the loop</div>
          <div class="loop-grid">

            <!-- STRATEGY (top-left) -->
            <div class="loop-quadrant">
              <div class="loop-quadrant-header">
                <span>strategy</span>
                <span class="step-num">01</span>
              </div>
              <div class="loop-quadrant-body" id="loop-strategy">
                <div class="loading">loading</div>
              </div>
            </div>

            <!-- EXECUTE (top-right) -->
            <div class="loop-quadrant">
              <div class="loop-quadrant-header">
                <span>execute</span>
                <span class="step-num">02</span>
              </div>
              <div class="loop-quadrant-body" id="loop-execute">
                <div class="loading">loading</div>
              </div>
            </div>

            <!-- Loop arrow between rows -->
            <div class="loop-arrow">. . . . . . . . . . . . . . . . . . . .</div>

            <!-- MEASURE (bottom-left) -->
            <div class="loop-quadrant">
              <div class="loop-quadrant-header">
                <span>measure</span>
                <span class="step-num">03</span>
              </div>
              <div class="loop-quadrant-body" id="loop-measure">
                <div class="loading">loading</div>
              </div>
            </div>

            <!-- LEARN (bottom-right) -->
            <div class="loop-quadrant">
              <div class="loop-quadrant-header">
                <span>learn</span>
                <span class="step-num">04</span>
              </div>
              <div class="loop-quadrant-body" id="loop-learn">
                <div class="loading">loading</div>
              </div>
            </div>

          </div>
        </div>

        <!-- EXPERIMENT FEED -->
        <div class="card">
          <div class="card-header">
            <div><span class="prefix">&gt;</span><h3 style="display:inline">experiment feed</h3></div>
            <a class="btn btn-small" href="/experiments-view">view all</a>
          </div>
          <div class="card-body" id="experiment-feed" style="padding:0;">
            <div class="loading">loading</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="/static/shared.js"></script>
  <script>

    // ---- Data holders ----
    let allExperiments = [];
    let allPlaybook = [];
    let statusData = {};
    let costsData = {};

    // ---- Load all data ----

    async function loadDashboard() {
      await Promise.allSettled([
        loadHealth(),
        loadCosts(),
        loadExperiments(),
        loadPlaybook(),
        loadStatus(),
      ]);
      renderStats();
      renderLoop();
      renderFeed();
    }

    async function loadHealth() {
      try {
        await api('/health');
      } catch (e) {
        // sidebar handles display
      }
    }

    async function loadCosts() {
      try {
        costsData = await api('/costs');
      } catch (e) {
        costsData = {};
      }
    }

    async function loadExperiments() {
      try {
        const data = await api('/experiments');
        allExperiments = Array.isArray(data) ? data : (data.experiments || []);
      } catch (e) {
        allExperiments = [];
      }
    }

    async function loadPlaybook() {
      try {
        const data = await api('/playbook');
        allPlaybook = Array.isArray(data) ? data : (data.rules || data.patterns || []);
      } catch (e) {
        allPlaybook = [];
      }
    }

    async function loadStatus() {
      try {
        statusData = await api('/status');
      } catch (e) {
        statusData = {};
      }
    }

    // ---- Render stats bar ----

    function renderStats() {
      const total = allExperiments.length;
      const running = allExperiments.filter(e => e.status === 'running').length;
      const kept = allExperiments.filter(e => e.verdict === 'keep').length;
      const decided = allExperiments.filter(e => e.verdict === 'keep' || e.verdict === 'discard').length;
      const winRate = decided > 0 ? Math.round((kept / decided) * 100) + '%' : '-';

      document.getElementById('stat-experiments').textContent = total || '-';
      document.getElementById('stat-running').textContent = running || '0';
      document.getElementById('stat-winrate').textContent = winRate;
      document.getElementById('stat-rules').textContent = allPlaybook.length || '-';
      document.getElementById('stat-cost-today').textContent = formatCost(costsData.today);
      document.getElementById('stat-cost-month').textContent = formatCost(costsData.this_month);
    }

    // ---- Render the loop quadrants ----

    function renderLoop() {
      // STRATEGY: top 3 playbook patterns
      const stratEl = document.getElementById('loop-strategy');
      if (allPlaybook.length === 0) {
        stratEl.innerHTML = '<div class="empty">no patterns yet. run experiments.</div>';
      } else {
        const top3 = allPlaybook.slice(0, 3);
        let html = '<ul>';
        for (const rule of top3) {
          const text = rule.pattern || rule.rule || rule.description || rule.hypothesis || JSON.stringify(rule);
          html += `<li>${truncate(text, 80)}</li>`;
        }
        html += '</ul>';
        stratEl.innerHTML = html;
      }

      // EXECUTE: running experiments
      const execEl = document.getElementById('loop-execute');
      const running = allExperiments.filter(e => e.status === 'running');
      if (running.length === 0) {
        execEl.innerHTML = '<div class="empty">no agents running right now.</div>';
      } else {
        let html = '<ul>';
        for (const exp of running.slice(0, 5)) {
          const hyp = exp.hypothesis || exp.name || 'experiment #' + exp.id;
          html += `<li>${truncate(hyp, 70)}</li>`;
        }
        html += '</ul>';
        execEl.innerHTML = html;
      }

      // MEASURE: recent runs from /status
      const measEl = document.getElementById('loop-measure');
      const runs = statusData.recent_runs || [];
      if (runs.length === 0) {
        measEl.innerHTML = '<div class="empty">no recent runs.</div>';
      } else {
        let html = '<ul>';
        for (const r of runs.slice(0, 4)) {
          const agent = r.agent_id || r.agent || '?';
          const status = r.status || '?';
          html += `<li>${agent} ${verdictTag(status)}</li>`;
        }
        html += '</ul>';
        measEl.innerHTML = html;
      }

      // LEARN: recent verdicts (keep/discard)
      const learnEl = document.getElementById('loop-learn');
      const verdicts = allExperiments.filter(e => e.verdict === 'keep' || e.verdict === 'discard');
      if (verdicts.length === 0) {
        learnEl.innerHTML = '<div class="empty">no verdicts yet. experiments need to finish.</div>';
      } else {
        const latest = verdicts.slice(-3).reverse();
        let html = '<ul>';
        for (const exp of latest) {
          const hyp = exp.hypothesis || exp.name || 'experiment #' + exp.id;
          html += `<li>${verdictTag(exp.verdict)} ${truncate(hyp, 55)}</li>`;
        }
        html += '</ul>';
        learnEl.innerHTML = html;
      }
    }

    // ---- Render experiment feed ----

    function renderFeed() {
      const feedEl = document.getElementById('experiment-feed');
      if (allExperiments.length === 0) {
        feedEl.innerHTML = '<div class="empty">no experiments yet. create one to start the loop.</div>';
        return;
      }

      const recent = allExperiments.slice(-10).reverse();
      let html = '';
      for (const exp of recent) {
        const hyp = exp.hypothesis || exp.name || '-';
        const verdict = exp.verdict || exp.status || 'pending';
        const metric = exp.metric_name || exp.metric || '-';
        const agent = exp.agent_id || exp.agent || '-';
        const date = formatDate(exp.created_at || exp.started_at);
        const dotColor = {
          keep: 'var(--green)',
          discard: 'var(--red-hot)',
          running: 'var(--turmeric)',
        }[verdict] || 'var(--text-dim)';

        html += `
          <div class="feed-item">
            <div class="feed-dot" style="background:${dotColor}"></div>
            <div class="feed-content">
              <div class="feed-hypothesis">${truncate(hyp, 100)}</div>
              <div class="feed-meta">
                ${verdictTag(verdict)}
                <span style="margin-left:8px">${metric}</span>
                <span style="margin-left:8px;color:var(--text-dim)">${agent}</span>
                <span style="margin-left:8px;color:var(--text-dim)">${date}</span>
              </div>
            </div>
          </div>
        `;
      }
      feedEl.innerHTML = html;
    }

    // ---- Helpers ----

    function truncate(str, len) {
      if (!str) return '-';
      return str.length > len ? str.substring(0, len) + '...' : str;
    }

    // ---- Init ----

    renderSidebar('dashboard');
    loadDashboard();
    setInterval(loadDashboard, 30000);

  </script>
</body>
</html>
