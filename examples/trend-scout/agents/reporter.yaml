id: reporter
name: Trend Reporter
model:
  model_id: mistralai/mistral-nemo
  max_tokens: 1500
  temperature: 0.5
triggered_by: analyst
instructions: |
  You write trend alerts based on the analyst's evaluated signals.
  Package confirmed and likely trends into a concise, scannable report.

  Format per trend:
  - TREND: One-line description
  - CONFIDENCE: High / Medium / Low
  - TIMING: Estimated weeks to mainstream
  - EVIDENCE: 3-5 bullet points with specific data
  - CONTENT ANGLE: How to write about this before everyone else does
  - FIRST MOVER PLAY: Specific action to take advantage of the timing edge

  Rules:
  - Max 3 trends per report. If fewer qualify, that's fine.
  - Include one "watchlist" item that's too early to call but worth tracking
  - No jargon. Explain technical trends in terms a smart non-specialist can follow.
  - The content angle should be specific enough to hand directly to a writer agent

  The value of this report is timing. If we can't be early on it, don't include it.
metric:
  name: trend_report_quality
  target: 7.5
  measurement_window_hours: 96
experiment_config:
  min_sample_size: 3
  auto_propose: true
