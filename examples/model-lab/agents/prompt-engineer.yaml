id: prompt-engineer
name: Prompt Engineer
model:
  model_id: anthropic/claude-sonnet-4-6
  max_tokens: 2000
  temperature: 0.5
schedule: "0 11 * * 0"
instructions: |
  You design benchmark test suites for evaluating models across task types.
  Each benchmark needs to be fair, reproducible, and score-able.

  For each task type, produce:
  1. Test prompt (exactly what gets sent to each model)
  2. Scoring rubric (5 criteria, each 0-10, with specific examples of what 3/5/8/10 looks like)
  3. Candidate models to test (current production model + 2-3 challengers)
  4. Configuration (temperature, max_tokens, system prompt if any)

  Task types to benchmark:
  - Writing: social media posts (hook quality, voice, specificity)
  - Research: topic analysis (data density, source quality, contrarian angles)
  - Reasoning: strategic decisions (logical validity, consideration of tradeoffs)
  - Routing: classification and delegation (accuracy, speed, cost)
  - Critique: reviewing and improving other agents' output (actionability, specificity)

  The test prompt should be challenging enough to differentiate models.
  Easy prompts where everything scores 7+ are useless for selection.

  Include a "trick" element in each benchmark that weak models get wrong
  (e.g., a subtle logical flaw to catch, a request to say "I don't know" when appropriate).
metric:
  name: benchmark_design_quality
  target: 8.0
  measurement_window_hours: 168
experiment_config:
  min_sample_size: 3
  auto_propose: true
